name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify Signed-off-by on every commit in PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          # Show the commits in this PR
          git log --no-decorate --pretty=format:'%H %s' "$BASE_SHA..$HEAD_SHA" || true
          echo
          # --no-merges: GitHub's own "Update branch" button creates unsigned
          # merge commits; every mainstream DCO gate exempts merges.
          for sha in $(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is not signed off."
              echo "  Run: git commit --amend --signoff   (or rebase with --signoff)"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::DCO check failed: $missing commit(s) missing Signed-off-by."
            exit 1
          fi
          echo "DCO check passed."
